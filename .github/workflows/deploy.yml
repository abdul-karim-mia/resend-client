name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install pnpm ──────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # ── 3. Install Node.js with pnpm cache ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. TypeScript type check (catches compile errors before deploy) ───────
      - name: Type check frontend
        run: pnpm --filter frontend exec tsc --noEmit

      - name: Type check worker
        run: pnpm --filter worker exec tsc --noEmit

      # ── 6. Build React frontend into frontend/dist/ ──────────────────────────
      - name: Build frontend
        run: pnpm --filter frontend build

      # ── 7. Push all Worker secrets to Cloudflare ────────────────────────────
      # Required GitHub repository secrets (Settings → Secrets & variables → Actions):
      #   CLOUDFLARE_API_TOKEN   — https://dash.cloudflare.com/profile/api-tokens
      #                            (use "Edit Cloudflare Workers" template)
      #   CLOUDFLARE_ACCOUNT_ID  — Cloudflare dashboard right sidebar
      #   MASTER_ENCRYPTION_KEY  — generated by: node scripts/setup-secrets.mjs
      #   JWT_SECRET             — generated by: node scripts/setup-secrets.mjs
      #   ADMIN_USERNAME         — your chosen login username (e.g. "admin")
      #   ADMIN_PASSWORD_HASH    — generated by: node scripts/setup-secrets.mjs
      - name: Push Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        run: |
          # Build the JSON payload using printf + env vars (safe against special chars)
          printf '{"MASTER_ENCRYPTION_KEY":"%s","JWT_SECRET":"%s","ADMIN_USERNAME":"%s","ADMIN_PASSWORD_HASH":"%s"}' \
            "$MASTER_ENCRYPTION_KEY" "$JWT_SECRET" "$ADMIN_USERNAME" "$ADMIN_PASSWORD_HASH" \
            | npx wrangler@latest secret bulk --env="" --config wrangler.jsonc

      # ── 8. Deploy Worker + static assets ────────────────────────────────────
      # --env="" targets the top-level (production) environment in wrangler.jsonc,
      # not the "development" env block. This is intentional.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc --env=""
