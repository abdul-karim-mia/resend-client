name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build

      # Push all required Worker secrets from GitHub Secrets.
      # Set these in: GitHub repo → Settings → Secrets & variables → Actions
      #   - CLOUDFLARE_API_TOKEN
      #   - CLOUDFLARE_ACCOUNT_ID
      #   - MASTER_ENCRYPTION_KEY   (generate: openssl rand -hex 32)
      #   - JWT_SECRET              (generate: openssl rand -hex 48)
      #   - ADMIN_USERNAME          (e.g. "admin")
      #   - ADMIN_PASSWORD_HASH     (run: node scripts/setup-secrets.mjs)
      - name: Push Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
        run: |
          # Use printf + env vars to safely build JSON (avoids interpolation issues with quotes/backslashes)
          printf '{"MASTER_ENCRYPTION_KEY":"%s","JWT_SECRET":"%s","ADMIN_USERNAME":"%s","ADMIN_PASSWORD_HASH":"%s"}' \
            "$MASTER_ENCRYPTION_KEY" "$JWT_SECRET" "$ADMIN_USERNAME" "$ADMIN_PASSWORD_HASH" \
            | npx wrangler@latest secret bulk --config wrangler.jsonc

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler.jsonc lives at repo root — no workingDirectory needed
          command: deploy --config wrangler.jsonc
